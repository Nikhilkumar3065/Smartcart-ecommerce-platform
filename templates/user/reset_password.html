{% extends 'base.html' %}

{% block title %}Reset Password - SmartCart{% endblock %}

{% block content %}
<div class="auth-wrapper mb-5">
    <div class="card auth-card shadow-lg p-4 p-md-5">

        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-primary-subtle text-primary rounded-circle p-2 mb-3" style="width: 50px; height: 50px;">
                <i class="bi bi-shield-lock fs-4"></i>
            </div>
            <h2 class="auth-title mb-2">Reset Password</h2>
            <p class="text-muted">Enter a new secure password for your account below.</p>
        </div>

        <form method="POST" action="{{ url_for('reset_password', token=token) }}">
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="New password" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Confirm password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3">Reset Password</button>
        </form>

    </div>
</div>
{% endblock %}
