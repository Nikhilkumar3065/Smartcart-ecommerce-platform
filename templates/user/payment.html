<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - SmartCart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

    <div class="card shadow-lg border-0 mx-auto" style="max-width:600px;">
        <div class="card-body text-center p-5">

            <h2 class="fw-bold mb-3">
                Complete Your Payment
            </h2>

            <p class="text-muted">
                Secure payment powered by Razorpay
            </p>

            <hr>

            <h4 class="mb-4">
                Total Amount
            </h4>

            <h1 class="text-success fw-bold mb-4">
                ₹{{ "%.2f"|format(amount) }}
            </h1>

            <button id="rzp-button" class="btn btn-success btn-lg px-5">
                Pay Now
            </button>

            <div class="mt-4">
                <a href="{{ url_for('cart') }}" class="btn btn-outline-secondary">
                    Back to Cart
                </a>
            </div>

        </div>
    </div>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
var options = {
    "key": "{{ key_id }}",
    "amount": "{{ amount * 100 }}",
    "currency": "INR",
    "name": "SmartCart",
    "description": "Order Payment",
    "order_id": "{{ order_id }}",
    "handler": function (response){
        // Build a small form and POST to server for verification
        var form = document.createElement("form");
        form.method = "POST";
        form.action = "/verify-payment";

        var fields = {
            razorpay_payment_id: response.razorpay_payment_id,
            razorpay_order_id: response.razorpay_order_id,
            razorpay_signature: response.razorpay_signature
        };

        for (var name in fields) {
            var input = document.createElement("input");
            input.type = "hidden";
            input.name = name;
            input.value = fields[name];
            form.appendChild(input);
        }

        document.body.appendChild(form);
        form.submit();
    },
    "prefill": {
        // optionally prefill user info
    }
};

var rzp = new Razorpay(options);
document.getElementById('rzp-button').onclick = function(e){
    rzp.open();
    e.preventDefault();
}
</script>


</body>
</html>
