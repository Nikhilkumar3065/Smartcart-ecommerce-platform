{% extends 'base.html' %}

{% block title %}Shipping Address - SmartCart{% endblock %}

{% block content %}
<div class="container py-4 px-0 mb-5">

    <div class="card border-0 shadow-sm p-4 p-md-5 mx-auto" style="max-width: 900px;">

        <!-- HEADER -->
        <div class="row mb-4 pb-3 border-bottom align-items-center">
            <div class="col-md-8">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-geo-alt fs-3 text-primary"></i>
                    <h2 class="fw-bold mb-0">Shipping Address</h2>
                </div>
                <p class="text-muted mb-0 mt-1">
                    Please provide your delivery information to complete your order.
                </p>
            </div>
            <div class="col-md-4 text-md-end mt-3 mt-md-0">
                <p class="text-muted mb-0 small">Order Total</p>
                <h3 class="fw-bold text-primary mb-0">₹{{ "%.2f"|format(total or 0) }}</h3>
            </div>
        </div>

        <!-- FORM -->
        <form method="POST" class="row g-3">

            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="full_name"
                           class="form-control"
                           placeholder="John Doe"
                           value="{{ address.get('full_name','') if address else '' }}"
                           required>
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email"
                           class="form-control"
                           placeholder="john.doe@example.com"
                           value="{{ address.get('email', session.get('user_name','')) if address else session.get('user_name','') }}"
                           required>
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                    <input type="tel" name="phone"
                           class="form-control"
                           placeholder="10-digit mobile number"
                           value="{{ address.get('phone','') if address else '' }}"
                           required>
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label">Country</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-globe2"></i></span>
                    <select name="country" class="form-select" required>
                        <option value="">Select country</option>
                        <option value="India" {% if address and address.get('country') == 'India' %}selected{% endif %}>India</option>
                        <option value="United States" {% if address and address.get('country') == 'United States' %}selected{% endif %}>United States</option>
                        <option value="United Kingdom" {% if address and address.get('country') == 'United Kingdom' %}selected{% endif %}>United Kingdom</option>
                        <option value="Canada" {% if address and address.get('country') == 'Canada' %}selected{% endif %}>Canada</option>
                        <option value="Australia" {% if address and address.get('country') == 'Australia' %}selected{% endif %}>Australia</option>
                    </select>
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label">State / Region</label>
                <input type="text" name="state"
                       class="form-control"
                       placeholder="e.g. Karnataka"
                       value="{{ address.get('state','') if address else '' }}"
                       required>
            </div>

            <div class="col-md-6">
                <label class="form-label">City</label>
                <input type="text" name="city"
                       class="form-control"
                       placeholder="e.g. Bengaluru"
                       value="{{ address.get('city','') if address else '' }}"
                       required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Postal Code</label>
                <input type="text" name="postal_code"
                       class="form-control"
                       placeholder="e.g. 560001"
                       value="{{ address.get('postal_code','') if address else '' }}"
                       required>
            </div>

            <div class="col-12">
                <label class="form-label">Street Address</label>
                <input type="text" name="address_line1"
                       class="form-control"
                       placeholder="Flat/House No, Apartment Name, Street Name"
                       value="{{ address.get('address_line1','') if address else '' }}"
                       required>
            </div>

            <div class="col-12">
                <label class="form-label">Apartment / Suite (Optional)</label>
                <input type="text" name="address_line2"
                       class="form-control"
                       placeholder="Suite, unit, building, floor, etc."
                       value="{{ address.get('address_line2','') if address else '' }}">
            </div>

            <div class="col-md-6">
                <label class="form-label">Landmark (Optional)</label>
                <input type="text" name="landmark"
                       class="form-control"
                       placeholder="e.g. Near Metro Station"
                       value="{{ address.get('landmark','') if address else '' }}">
            </div>

            <!-- BUTTONS -->
            <div class="col-12 d-flex justify-content-between mt-5 pt-3 border-top">
                <a href="{{ url_for('cart') }}" class="btn btn-outline-dark px-4 py-2">
                    <i class="bi bi-arrow-left"></i> Back to Cart
                </a>
                <button type="submit" class="btn btn-primary px-4 py-2">
                    Continue to Payment <i class="bi bi-arrow-right"></i>
                </button>
            </div>

        </form>

    </div>

</div>
{% endblock %}
