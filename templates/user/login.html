{% extends 'base.html' %}

{% block title %}Login - SmartCart{% endblock %}

{% block content %}
<div class="auth-wrapper mb-5">
    <div class="card auth-card shadow-lg p-4 p-md-5">

        <div class="text-center mb-4">
            <h2 class="auth-title mb-2">Welcome Back</h2>
            <p class="text-muted">Sign in to your SmartCart account to continue shopping.</p>
        </div>

        <!-- Login Form -->
        <form method="POST" action="{{ url_for('login') }}">

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label mb-0">Password</label>
                    <a href="{{ url_for('forgot_password') }}" class="small text-decoration-none">Forgot password?</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 d-flex align-items-center justify-content-center gap-2">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
        </form>

        <hr class="my-4">

        <div class="text-center small text-muted">
            Don’t have an account yet? 
            <a href="{{ url_for('register') }}" class="fw-bold text-decoration-none ms-1">Register Now</a>
        </div>

    </div>
</div>
{% endblock %}
