{% extends 'base.html' %}

{% block title %}Register - SmartCart{% endblock %}

{% block content %}
<div class="auth-wrapper mb-5">
    <div class="card auth-card shadow-lg p-4 p-md-5" style="max-width: 600px;">

        <div class="text-center mb-4">
            <h2 class="auth-title mb-2">Create Account</h2>
            <p class="text-muted">Register to get exclusive discount codes, track your orders, and checkout faster.</p>
        </div>

        <form method="POST" action="/register">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Create a secure password" required>
                </div>
                <div class="form-text small text-muted mt-1">Must be at least 6 characters.</div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 d-flex align-items-center justify-content-center gap-2">
                <i class="bi bi-person-plus-fill"></i> Create Account
            </button>

        </form>

        <hr class="my-4">

        <div class="text-center small text-muted">
            Already have an account? 
            <a href="/login" class="fw-bold text-decoration-none ms-1">Login here</a>
        </div>

    </div>
</div>
{% endblock %}
