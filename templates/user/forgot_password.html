{% extends 'base.html' %}

{% block title %}Forgot Password - SmartCart{% endblock %}

{% block content %}
<div class="auth-wrapper mb-5">
    <div class="card auth-card shadow-lg p-4 p-md-5">

        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-warning-subtle text-warning rounded-circle p-2 mb-3" style="width: 50px; height: 50px;">
                <i class="bi bi-key fs-4"></i>
            </div>
            <h2 class="auth-title mb-2">Forgot Password</h2>
            <p class="text-muted">Enter your email and we'll send you a secure link to reset your password.</p>
        </div>

        <form method="POST" action="/forgot-password">
            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3">Send Reset Link</button>
        </form>

        <hr class="my-4">

        <div class="text-center small">
            <a href="/login" class="text-decoration-none fw-bold"><i class="bi bi-arrow-left"></i> Back to Login</a>
        </div>

    </div>
</div>
{% endblock %}
